<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="60" fill="url(#grad)"/>

  <!-- Music note icon in white -->
  <g transform="translate(128, 128)">
    <!-- Top note -->
    <circle cx="-20" cy="-30" r="12" fill="white"/>
    <rect x="-18" y="-18" width="4" height="48" fill="white"/>

    <!-- Bottom note -->
    <circle cx="25" cy="0" r="12" fill="white"/>
    <rect x="27" y="12" width="4" height="36" fill="white"/>

    <!-- Connecting line -->
    <path d="M -14 18 Q 15 12 29 12" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
</svg>
